<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FedEx Duiven-QAR Yard House Rules</title>
<style>
:root {
  --fx-purple:#4d148c;
  --fx-orange:#ff6600;
  --bg:#f3eef7;
  --card:#ffffff;
  --text:#1f2430;
  --muted:#687083;
  --line:rgba(77,20,140,.12);
  --shadow:0 14px 36px rgba(77,20,140,.10);
  --radius:22px;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;
  font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at top right, rgba(77,20,140,.12), transparent 28%),
    radial-gradient(circle at top left, rgba(255,102,0,.08), transparent 26%),
    linear-gradient(180deg,#faf8fc 0%,#f2edf7 100%);
}
.splash {
  position:fixed; inset:0; z-index:999;
  display:grid; place-items:center;
  background:linear-gradient(135deg,#40106f 0%, #5a1aa0 42%, #ff6b1a 120%);
  color:#fff; transition:opacity .55s ease, visibility .55s ease;
}
.splash.hide{opacity:0; visibility:hidden; pointer-events:none}
.splash-inner{text-align:center; padding:20px}
.brand{font-weight:900; font-size:clamp(3rem,14vw,5.8rem); letter-spacing:-.08em; line-height:1}
.brand .fed{color:#fff}
.brand .ex{color:var(--fx-orange)}
.arrow{display:inline-block; width:0; height:0; border-left:.62em solid currentColor; border-top:.34em solid transparent; border-bottom:.34em solid transparent; margin:0 -.05em 0 -.13em}
.brand .arrow{color:#fff}
.splash-tag{margin-top:16px; font-size:clamp(1rem,4vw,1.25rem); opacity:.92; letter-spacing:.05em}
.app{opacity:0; transform:translateY(10px); transition:opacity .5s ease, transform .5s ease}
.app.ready{opacity:1; transform:none}
.shell{max-width:560px; margin:0 auto; padding:12px 12px 28px}
.topbar{
  position:sticky; top:0; z-index:20;
  display:flex; align-items:center; justify-content:space-between; gap:12px;
  padding:10px 12px; margin-bottom:12px;
  background:rgba(250,248,252,.82); backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,.55); border-radius:18px;
  box-shadow:0 8px 24px rgba(77,20,140,.08);
}
.logo{font-size:2rem; font-weight:900; letter-spacing:-.07em; line-height:1}
.logo .fed{color:var(--fx-purple)}
.logo .ex{color:var(--fx-orange)}
.logo .arrow{color:var(--fx-purple); border-left-width:.45em; border-top-width:.22em; border-bottom-width:.22em}
.toptext strong{display:block; font-size:.98rem; letter-spacing:-.02em}
.toptext small{display:block; color:var(--muted); font-weight:700}
.topleft{display:flex; align-items:center; gap:10px; min-width:0}
.lang-box{display:flex; align-items:center; gap:8px; min-width:0}
.lang-box label{display:none}
.lang-box select{
  border:1px solid var(--line); background:#fff; color:var(--fx-purple);
  font-weight:800; border-radius:999px; padding:10px 14px; max-width:160px;
}
.hero, .section-card {
  background:var(--card); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow);
}
.hero{padding:18px; margin-bottom:14px; overflow:hidden; position:relative}
.hero::after{content:""; position:absolute; right:-18px; bottom:-24px; width:160px; height:160px; opacity:.12;
  background:linear-gradient(135deg,var(--fx-orange),var(--fx-purple)); clip-path:polygon(100% 0, 0 100%, 100% 100%);
}
.eyebrow{display:inline-flex; align-items:center; gap:8px; padding:7px 10px; border-radius:999px; background:rgba(77,20,140,.08); color:var(--fx-purple); font-weight:800; font-size:.78rem; margin-bottom:10px}
.hero h1{margin:0; font-size:1.85rem; line-height:1.02; letter-spacing:-.04em; position:relative; z-index:1}
.hero p{margin:10px 0 0; color:var(--muted); line-height:1.55; position:relative; z-index:1}
.tap-hint{margin-top:12px; display:inline-block; padding:7px 10px; border-radius:999px; background:rgba(255,102,0,.10); color:#934100; font-weight:800; font-size:.8rem}
.call-strip{display:grid; gap:12px; margin:14px 0}
.call-btn{display:block; text-decoration:none; border-radius:20px; overflow:hidden; background:#000; box-shadow:0 12px 26px rgba(0,0,0,.18); border:1px solid rgba(255,255,255,.08)}
.call-btn img{display:block; width:100%; height:auto}
.sections{display:grid; gap:14px}
.section-card{padding:16px}
.section-head{display:flex; align-items:center; gap:10px; margin-bottom:10px}
.section-icon{width:40px; height:40px; border-radius:12px; display:grid; place-items:center; color:#fff; font-weight:900; flex:0 0 auto}
.section-icon.purple{background:linear-gradient(135deg,#6a24b8,#4d148c)}
.section-icon.orange{background:linear-gradient(135deg,#ff8a1d,#ff6600)}
.section-title{margin:0; font-size:1.08rem; line-height:1.2; letter-spacing:-.02em}
.section-body p{margin:0 0 10px; color:var(--muted); line-height:1.58}
.section-body ul{margin:0; padding-left:1.05rem; display:grid; gap:8px}
.section-body li{line-height:1.5}
.media-grid{display:grid; gap:10px; margin-top:14px}
.media-grid.two{grid-template-columns:1fr 1fr}
.media-grid.one{grid-template-columns:1fr}
.section-media{overflow:hidden; border-radius:16px; border:1px solid var(--line); background:#f7f4fa}
.section-media img{display:block; width:100%; height:auto; aspect-ratio:16/10; object-fit:cover}
.footer{text-align:center; padding:20px 14px 8px; color:var(--fx-purple); font-weight:900; font-size:1.45rem; letter-spacing:-.03em}
.footer small{display:block; margin-top:8px; color:var(--muted); font-size:.88rem; font-weight:700}
@media (max-width:420px) {
  .hero h1{font-size:1.65rem}
  .media-grid.two{grid-template-columns:1fr}
  .lang-box select{max-width:140px}
}
@media (prefers-reduced-motion: reduce) {
  html{scroll-behavior:auto}
  *, *::before, *::after{animation:none !important; transition:none !important}
}
</style>
</head>

</div>

<script>
const content = {"en": {"languageName": "English", "ui": {"language": "Language", "title": "Duiven-QAR Yard House Rules", "subtitle": "Safety First", "intro": "Mobile-friendly house rules for drivers. Tap the pictograms to call immediately.", "tapHint": "Tap a pictogram to call directly.", "footer": "Think Safety. Act Safely. Be Safe."}, "sections": [{"title": "Introduction", "text": "These rules apply to all drivers, including subcontracted drivers, at the Duiven-QAR FedEx Express location.", "bullets": ["The goal is safety, order, and proper site operation.", "Always follow local rules and the instructions of security personnel and shunters."]}, {"title": "Site safety rules", "bullets": ["The speed limit on site is 15 km/h.", "There is one-way traffic when entering via the security gate. Drive forward and do not turn left immediately.", "Walk only on designated pedestrian paths.", "Do not access the warehouse without authorization.", "Drugs and public intoxication are strictly prohibited on site."]}, {"title": "Personal protective measures", "bullets": ["Wear a closed high-visibility safety vest.", "Wear class S3 safety shoes on the yard.", "Use appropriate safety equipment when docking or handling trailers.", "Flip-flops, slippers, and open footwear are not allowed on site."]}, {"title": "Badge procedure – gatehouse access", "bullets": ["Collect a badge at the security desk in the downstairs gatehouse.", "The badge gives access to the gatehouse and the canteen during opening hours.", "Return the badge when leaving the gatehouse.", "Unreturned badges will be blocked."]}, {"title": "Parking instructions", "bullets": ["Park within the designated parking boxes.", "Check for personal vehicles nearby before maneuvering.", "Proper parking helps safety and prevents damage.", "Keep parking and operational areas clean and orderly."]}, {"title": "Keep the gatehouse clean and comfortable", "bullets": ["Leave tables, chairs, and shared areas clean after use.", "Use the garbage bins for all waste.", "Slide chairs back and return them to their place.", "Keep the toilets clean."]}, {"title": "Help us keep the yard clean", "bullets": ["Use the waste containers for trash.", "Do not leave bottles, cans, broken glass, cardboard, paper towels, cigarette butts, or dirty dishes on the ground.", "Cooking or frying is allowed only in the designated area.", "Gas stoves or gas bottles between trucks are strictly forbidden.", "Washing entire vehicles on site is not permitted."]}, {"title": "What to do in case of emergency", "bullets": ["Stay calm.", "In emergencies, always call 112 first.", "Inform the security team at 0316 799476 and report the location, circumstances, and number of injured people.", "In case of fire, leave via the nearest emergency exit and follow staff to the assembly point."]}, {"title": "Smoking", "bullets": ["Smoking is only allowed in designated areas."]}]}, "de": {"languageName": "Deutsch", "ui": {"language": "Sprache", "title": "Duiven-QAR Hofordnung", "subtitle": "Sicherheit zuerst", "intro": "Mobil optimierte Hofregeln für Fahrer. Tippen Sie auf die Piktogramme, um sofort anzurufen.", "tapHint": "Piktogramm antippen, um direkt anzurufen.", "footer": "Sicherheit denken. Sicher handeln. Sicher bleiben."}, "sections": [{"title": "Einführung", "text": "Diese Regeln gelten für alle Fahrer, einschließlich Subunternehmer, am FedEx-Express-Standort Duiven-QAR.", "bullets": ["Ziel sind Sicherheit, Ordnung und ein reibungsloser Betrieb.", "Befolgen Sie immer die lokalen Regeln sowie die Anweisungen von Sicherheitsdienst und Rangierfahrern."]}, {"title": "Sicherheitsregeln auf dem Gelände", "bullets": ["Auf dem Gelände gilt 15 km/h.", "Beim Einfahren durch das Sicherheitstor gilt Einbahnverkehr. Geradeaus fahren und nicht sofort links abbiegen.", "Gehen Sie nur auf den ausgewiesenen Fußwegen.", "Betreten Sie das Lager nicht ohne Genehmigung.", "Drogen und öffentliche Trunkenheit sind streng verboten."]}, {"title": "Persönliche Schutzausrüstung", "bullets": ["Tragen Sie eine geschlossene Warnweste.", "Tragen Sie Sicherheitsschuhe Klasse S3 auf dem Hof.", "Verwenden Sie geeignete Schutzausrüstung beim Andocken oder Bewegen von Aufliegern.", "Flip-Flops, Hausschuhe und offenes Schuhwerk sind nicht erlaubt."]}, {"title": "Ausweisverfahren – Gatehouse-Zugang", "bullets": ["Holen Sie am Sicherheitsschalter im unteren Gatehouse einen Ausweis ab.", "Der Ausweis ermöglicht Zugang zum Gatehouse und während der Öffnungszeiten zur Kantine.", "Geben Sie den Ausweis beim Verlassen des Gatehouse zurück.", "Nicht zurückgegebene Ausweise werden gesperrt."]}, {"title": "Parkhinweise", "bullets": ["Parken Sie innerhalb der markierten Parkflächen.", "Prüfen Sie vor dem Rangieren, ob private Fahrzeuge in der Nähe stehen.", "Richtiges Parken erhöht die Sicherheit und verhindert Schäden.", "Halten Sie Park- und Betriebsflächen sauber und ordentlich."]}, {"title": "Gatehouse sauber und angenehm halten", "bullets": ["Hinterlassen Sie Tische, Stühle und Gemeinschaftsbereiche sauber.", "Benutzen Sie für allen Abfall die Mülleimer.", "Schieben Sie Stühle zurück und stellen Sie sie an ihren Platz.", "Halten Sie die Toiletten sauber."]}, {"title": "Helfen Sie mit, den Hof sauber zu halten", "bullets": ["Benutzen Sie die Abfallcontainer.", "Lassen Sie keine Flaschen, Dosen, Glasscherben, Kartons, Papierhandtücher, Zigarettenstummel oder schmutziges Geschirr auf dem Boden liegen.", "Kochen oder Braten ist nur im vorgesehenen Bereich erlaubt.", "Gaskocher oder Gasflaschen zwischen Lkw sind streng verboten.", "Das Waschen kompletter Fahrzeuge auf dem Gelände ist nicht erlaubt."]}, {"title": "Verhalten im Notfall", "bullets": ["Ruhe bewahren.", "Im Notfall immer zuerst 112 anrufen.", "Informieren Sie anschließend den Sicherheitsdienst unter 0316 799476 und melden Sie Ort, Umstände und Anzahl der Verletzten.", "Im Brandfall verlassen Sie das Gebäude über den nächsten Notausgang und folgen dem Personal zum Sammelpunkt."]}, {"title": "Rauchen", "bullets": ["Rauchen ist nur in den ausgewiesenen Bereichen erlaubt."]}]}, "nl": {"languageName": "Nederlands", "ui": {"language": "Taal", "title": "Duiven-QAR Yard House Rules", "subtitle": "Safety First", "intro": "Mobiel geoptimaliseerde huisregels voor chauffeurs. Tik op de pictogrammen om direct te bellen.", "tapHint": "Tik op een pictogram om direct te bellen.", "footer": "Denk veilig. Handel veilig. Blijf veilig."}, "sections": [{"title": "Introductie", "text": "Deze regels gelden voor alle chauffeurs, inclusief onderaannemers, op de FedEx Express-locatie Duiven-QAR.", "bullets": ["Het doel is veiligheid, orde en een goede werking van de site.", "Volg altijd de lokale regels en de instructies van beveiliging en rangeerders."]}, {"title": "Veiligheidsregels op de site", "bullets": ["De maximumsnelheid op het terrein is 15 km/u.", "Bij binnenkomst via de security gate geldt eenrichtingsverkeer. Rij rechtdoor en sla niet direct linksaf.", "Loop alleen op de aangegeven voetpaden.", "Betreed het warehouse niet zonder toestemming.", "Drugs en openbare dronkenschap zijn strikt verboden op de site."]}, {"title": "Persoonlijke beschermingsmaatregelen", "bullets": ["Draag een gesloten veiligheidsvest met hoge zichtbaarheid.", "Draag veiligheidsschoenen klasse S3 op het terrein.", "Gebruik geschikte veiligheidsmiddelen bij docken of het behandelen van trailers.", "Slippers, pantoffels en open schoenen zijn niet toegestaan."]}, {"title": "Badgeprocedure – toegang gatehouse", "bullets": ["Haal een badge op bij de securitybalie in het beneden-gatehouse.", "De badge geeft toegang tot het gatehouse en tijdens openingstijden tot de kantine.", "Lever de badge in wanneer u het gatehouse verlaat.", "Niet-ingeleverde badges worden geblokkeerd."]}, {"title": "Parkeerinstructies", "bullets": ["Parkeer binnen de aangegeven parkeervakken.", "Controleer voor het manoeuvreren of er personenauto’s in de buurt staan.", "Correct parkeren verhoogt de veiligheid en voorkomt schade.", "Houd parkeer- en werkgebieden schoon en ordelijk."]}, {"title": "Houd het gatehouse schoon en comfortabel", "bullets": ["Laat tafels, stoelen en gedeelde ruimtes schoon achter.", "Gebruik de afvalbakken voor al het afval.", "Zet stoelen terug op hun plaats.", "Houd de toiletten schoon."]}, {"title": "Help het yard schoon te houden", "bullets": ["Gebruik de afvalcontainers voor vuilnis.", "Laat geen flessen, blikjes, glasscherven, karton, papieren handdoeken, sigarettenpeuken of vuile vaat op de grond liggen.", "Koken of bakken is alleen toegestaan op de aangewezen plaats.", "Gasstellen of gasflessen tussen trucks zijn strikt verboden.", "Het volledig wassen van voertuigen op het terrein is niet toegestaan."]}, {"title": "Wat te doen in geval van nood", "bullets": ["Blijf kalm.", "Bel bij nood altijd eerst 112.", "Informeer daarna de beveiliging via 0316 799476 en meld locatie, omstandigheden en aantal gewonden.", "Verlaat bij brand het gebouw via de dichtstbijzijnde nooduitgang en volg het personeel naar het verzamelpunt."]}, {"title": "Roken", "bullets": ["Roken is alleen toegestaan in de daarvoor aangewezen zones."]}]}, "pl": {"languageName": "Polski", "ui": {"language": "Język", "title": "Regulamin placu Duiven-QAR", "subtitle": "Bezpieczeństwo przede wszystkim", "intro": "Regulamin zoptymalizowany pod telefon. Dotknij piktogramów, aby od razu zadzwonić.", "tapHint": "Dotknij piktogramu, aby zadzwonić bezpośrednio.", "footer": "Myśl bezpiecznie. Działaj bezpiecznie. Bądź bezpieczny."}, "sections": [{"title": "Wprowadzenie", "text": "Te zasady obowiązują wszystkich kierowców, także podwykonawców, na terenie FedEx Express Duiven-QAR.", "bullets": ["Celem jest bezpieczeństwo, porządek i prawidłowe funkcjonowanie obiektu.", "Zawsze stosuj się do lokalnych zasad oraz poleceń ochrony i shunterów."]}, {"title": "Zasady bezpieczeństwa na terenie", "bullets": ["Na terenie obowiązuje ograniczenie prędkości do 15 km/h.", "Przy wjeździe przez bramę ochrony obowiązuje function detectLanguage() {
  const saved = localStorage.getItem("houseRulesLang");
  if (saved && content[saved]) return saved;
  const langs = navigator.languages || [navigator.language || "en"];
  for (const lang of langs) {
    const short = String(lang).toLowerCase().split("-")[0];
    if (content[short]) return short;
  }
  return "en";
}

function buildLanguageOptions() {
  select.innerHTML = languageOrder.map(code => `<option value="${code}">${content[code].languageName}</option>`).join("");
}

  langLabel.textContent = t.ui.language;
  miniTitle.textContent = t.ui.title;
  miniSubtitle.textContent = t.ui.subtitle;
  heroTitle.textContent = t.ui.title;
  heroText.textContent = t.ui.intro;
  tapHint.textContent = t.ui.tapHint;
  footerText.innerHTML = `${t.ui.footer}<small>${t.ui.subtitle}</small>`;

  sectionsEl.innerHTML = t.sections.map((section, index) => {
    const [iconChar, iconColor] = sectionIcons[index] || ["•","purple"];
    const intro = section.text ? `<p>${section.text}</p>` : "";
    const bullets = (section.bullets || []).map(item => `<li>${item}</li>`).join("");
    const media = mediaByIndex[index] || [];
    const mediaClass = media.length > 1 ? "two" : "one";
    const mediaHtml = media.length ? `
      <div class="media-grid ${mediaClass}">
        ${media.map((src, imgIndex) => `
          <figure class="section-media">
            <img src="${src}" alt="${section.title} illustration ${imgIndex + 1}" loading="lazy" />
          </figure>
        `).join("")}
      </div>` : "";

    return `
      <article class="section-card">
        <div class="section-head">
          <div class="section-icon ${iconColor}">${iconChar}</div>
          <h2 class="section-title">${section.title}</h2>
        </div>
        <div class="section-body">
          ${intro}
          <ul>${bullets}</ul>
          ${mediaHtml}
        </div>
      </article>
    `;
  }).join("");
}

buildLanguageOptions();
render(detectLanguage());
select.addEventListener("change", (e) => render(e.target.value));

const splash = document.getElementById("splash");
const app = document.getElementById("app");
const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
setTimeout(() => {
  splash.classList.add("hide");
  app.classList.add("ready");
}, reducedMotion ? 150 : 1600);
</script>
</body>
</html>
